<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlipScout</title>
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="FlipScout" />
<meta name="theme-color" content="#0f0f0f" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #181818; --border: #272727;
    --text: #e8e8e8; --muted: #555;
    --green: #00e676; --green-dim: #00e67615;
    --red: #ff5252; --red-dim: #ff525215;
    --yellow: #ffd740; --yellow-dim: #ffd74015;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
  header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 10px; }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--green); }
  .tagline { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .main { max-width: 820px; margin: 0 auto; padding: 24px 16px; }
  .search-block { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .search-row { display: flex; gap: 8px; flex-wrap: wrap; }
  input { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 15px; padding: 12px 14px; border-radius: 6px; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
  input:focus { border-color: var(--green); }
  #q { flex: 1; min-width: 180px; }
  #cost { width: 128px; }
  button { background: var(--green); color: #000; border: none; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; padding: 12px 22px; border-radius: 6px; cursor: pointer; -webkit-appearance: none; }
  button:disabled { opacity: 0.4; }
  .hint { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .verdict { border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid; display: none; }
  .verdict.buy   { background: var(--green-dim); border-color: var(--green); }
  .verdict.pass  { background: var(--red-dim);   border-color: var(--red); }
  .verdict.maybe { background: var(--yellow-dim);border-color: var(--yellow); }
  .v-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .verdict.buy .v-label   { color: var(--green); }
  .verdict.pass .v-label  { color: var(--red); }
  .verdict.maybe .v-label { color: var(--yellow); }
  .v-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 2px; }
  .v-sub { font-size: 13px; color: var(--muted); }
  .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .s-label { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .s-val { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .g { color: var(--green); } .r { color: var(--red); } .y { color: var(--yellow); }
  .lh { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .lt { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .lc { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #444; }
  a.item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
  .i-price { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: var(--green); min-width: 70px; }
  .i-title { font-size: 13px; flex: 1; line-height: 1.4; color: #ccc; }
  .i-cond { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #444; white-space: nowrap; }
  .loading { text-align: center; padding: 48px 0; display: none; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
  .err { background: var(--red-dim); border: 1px solid var(--red); border-radius: 6px; padding: 14px; font-size: 13px; color: var(--red); font-family: 'JetBrains Mono', monospace; display: none; margin-bottom: 16px; }
  .empty { text-align: center; padding: 64px 0; color: #444; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .empty-txt { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  #results { display: none; }
  @media (max-width: 500px) { .search-row { flex-direction: column; } #cost { width: 100%; } }
</style>
</head>
<body>
<header>
  <div class="logo">Flip<span>Scout</span></div>
  <div class="tagline">// live ebay sold listings · pricing intel</div>
</header>
<div class="main">
  <div class="search-block">
    <div class="search-row">
      <input type="text" id="q" placeholder="e.g. DeWalt drill, PS4, Air Jordan 11…" />
      <input type="number" id="cost" placeholder="Your cost $" min="0" step="0.01" />
      <button id="btn">Scout</button>
    </div>
    <div class="hint">Enter what you'd pay locally to see your estimated profit</div>
  </div>
  <div class="err" id="err"></div>
  <div class="loading" id="loading"><div class="spinner"></div><div class="loading-txt">pulling live sold listings…</div></div>
  <div id="results">
    <div class="verdict" id="verdict">
      <div class="v-label" id="v-label"></div>
      <div class="v-title" id="v-title"></div>
      <div class="v-sub" id="v-sub"></div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="lh"><div class="lt">Recent Sold</div><div class="lc" id="lc"></div></div>
    <div id="list"></div>
  </div>
  <div class="empty" id="empty">
    <div class="empty-icon">🔍</div>
    <div class="empty-txt">search an item to see what it's actually selling for</div>
  </div>
</div>
<script>
document.getElementById('btn').addEventListener('click', run);
document.getElementById('q').addEventListener('keydown', e => e.key === 'Enter' && run());

async function run() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('err').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    const items = data.organic_results || [];
    if (!items.length) throw new Error('No sold listings found. Try a more specific search term.');
    render(items);
  } catch(e) {
    const el = document.getElementById('err');
    el.textContent = e.message;
    el.style.display = 'block';
    document.getElementById('empty').style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    btn.disabled = false;
  }
}

function getPrice(item) {
  if (item.price?.extracted) return item.price.extracted;
  if (item.price?.raw) { const n = parseFloat(item.price.raw.replace(/[^0-9.]/g,'')); if (!isNaN(n)) return n; }
  if (item.secondary_price?.extracted) return item.secondary_price.extracted;
  return null;
}

function render(items) {
  const prices = items.map(getPrice).filter(p => p && p > 0).sort((a,b) => a-b);
  if (!prices.length) { showErr('Could not read prices. Try a more specific search.'); return; }

  const avg = prices.reduce((s,p) => s+p, 0) / prices.length;
  const low = prices[0], high = prices[prices.length-1], med = prices[Math.floor(prices.length/2)];
  const net = avg - (avg * 0.1325 + 0.30);
  const c = parseFloat(document.getElementById('cost').value);
  const hasCost = !isNaN(c) && c > 0;
  const profit = hasCost ? net - c : null;
  const margin = hasCost ? (profit / avg) * 100 : null;

  let cls, label, title, sub;
  if (hasCost) {
    if (profit >= 20 && margin >= 25)  { cls='buy';   label='Signal: BUY';   title=`~$${profit.toFixed(0)} estimated profit`; sub=`${margin.toFixed(0)}% margin after eBay fees`; }
    else if (profit >= 10)             { cls='maybe'; label='Signal: MAYBE'; title=`~$${profit.toFixed(0)} estimated profit`; sub='Thin margin — negotiate the price down'; }
    else                               { cls='pass';  label='Signal: PASS';  title=profit<0?`You'd lose money at that price`:`Only ~$${profit.toFixed(0)} profit`; sub='Not worth the time. Move on.'; }
  } else { cls='maybe'; label='Market Data'; title=`Avg sold $${avg.toFixed(2)}`; sub='Enter your cost to get a buy/pass signal'; }

  const v = document.getElementById('verdict');
  v.className = `verdict ${cls}`; v.style.display = 'block';
  document.getElementById('v-label').textContent = label;
  document.getElementById('v-title').textContent = title;
  document.getElementById('v-sub').textContent = sub;

  let statsData = [
    {l:'Avg Sale Price',  v:`$${avg.toFixed(2)}`, c:''},
    {l:'Median Price',    v:`$${med.toFixed(2)}`, c:''},
    {l:'Low',             v:`$${low.toFixed(2)}`, c:''},
    {l:'High',            v:`$${high.toFixed(2)}`,c:''},
    {l:'After eBay Fees', v:`$${net.toFixed(2)}`, c:'y'},
    {l:'Sales Pulled',    v:prices.length,         c:''},
  ];
  if (hasCost) {
    statsData.push({l:'Est. Profit', v:`$${profit.toFixed(2)}`, c: profit>=0?'g':'r'});
    statsData.push({l:'Margin',      v:`${margin.toFixed(0)}%`, c: margin>=25?'g':margin>=10?'y':'r'});
  }
  document.getElementById('stats').innerHTML = statsData.map(s =>
    `<div class="stat"><div class="s-label">${s.l}</div><div class="s-val ${s.c}">${s.v}</div></div>`
  ).join('');

  document.getElementById('lc').textContent = `${items.length} results`;
  document.getElementById('list').innerHTML = items.slice(0,25).map(item => {
    const p = getPrice(item);
    return `<a class="item" href="${item.link||'https://ebay.com'}" target="_blank" rel="noopener">
      <div class="i-price">${p ? '$'+p.toFixed(2) : '—'}</div>
      <div class="i-title">${item.title||'Untitled'}</div>
      ${item.condition ? `<div class="i-cond">${item.condition}</div>` : ''}
    </a>`;
  }).join('');

  document.getElementById('results').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
